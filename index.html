<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Earth Archive | Ayushi Srivastava</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@1,900&family=Times+New+Roman:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body, html { margin: 0; padding: 0; color: #fff; font-family: 'Times New Roman', serif; background-color: #0c0f0c; scroll-behavior: smooth; }
        nav { position: fixed; top: 0; width: 100%; background: rgba(0,0,0,0.9); z-index: 1000; padding: 15px 0; display: flex; justify-content: center; gap: 25px; border-bottom: 1px solid #333; }
        .nav-link { color: #fff; text-transform: uppercase; font-size: 0.7rem; letter-spacing: 2px; text-decoration: none; opacity: 0.7; }
        
        /* WALLPAPER FINISHING LINE */
        .hero {
            height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center;
            background: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)), url('wallpaper.jpg'), url('https://wallpapercave.com/wp/wp4287713.jpg');
            background-size: cover; background-position: center; border-bottom: 3px solid rgba(255,255,255,0.2);
        }
        .main-title { font-family: 'Playfair Display', serif; font-size: clamp(2.5rem, 8vw, 5rem); font-style: italic; margin: 0; }
        .signature { margin-top: 15px; font-size: 0.8rem; letter-spacing: 3px; text-transform: uppercase; border-top: 1px solid #fff; padding-top: 10px; }

        /* CLEAN DARK GALLERY */
        .container { padding: 60px 15px; max-width: 700px; margin: 0 auto; }
        .memory-card { background: #111; border: 1px solid #222; border-radius: 5px; overflow: hidden; margin-bottom: 30px; box-shadow: 0 15px 30px rgba(0,0,0,0.5); }
        .memory-card img, .memory-card video { width: 100%; display: block; max-height: 70vh; object-fit: contain; background: #000; }
        .quote-display { padding: 25px; font-family: 'Playfair Display', serif; font-style: italic; font-size: 1.2rem; text-align: center; background: #161616; border-top: 1px solid #222; }

        /* UPLOAD AREA */
        .upload-panel { background: #111; border: 1px solid #333; padding: 30px; border-radius: 5px; margin-top: 50px; }
        .input-field { width: 100%; padding: 12px; background: #000; color: #fff; border: 1px solid #444; margin-bottom: 15px; box-sizing: border-box; }
        .btn { background: #fff; color: #000; border: none; padding: 15px; width: 100%; cursor: pointer; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; }
    </style>
</head>
<body>

    <nav>
        <a href="#cover-root" class="nav-link">Cover</a>
        <a href="#gallery-root" class="nav-link">Gallery</a>
        <a href="#contribution-root" class="nav-link">Submit</a>
    </nav>

    <div id="cover-root" class="hero">
        <h1 class="main-title">THE EARTH ARCHIVE</h1>
        <div class="signature">By Ayushi Srivastava</div>
    </div>

    <div class="container">
        <section id="gallery-root">
            <h2 style="text-align:center; font-style:italic; font-family:'Playfair Display'; margin-bottom: 40px;">The Gallery</h2>
            <div id="mainFeed"></div>
        </section>

        <section id="contribution-root">
            <div class="upload-panel">
                <p style="font-size: 0.8rem; color: #888; margin-bottom: 10px; text-align: center;">STEP 1: SELECT MEDIA | STEP 2: ADD THOUGHT</p>
                <input type="file" id="mediaIn" class="input-field">
                <input type="text" id="quoteIn" placeholder="Your thought..." class="input-field">
                <button class="btn" id="pubBtn">Publish to Archive</button>
            </div>
        </section>
    </div>

    <script>
        // Use a more stable global listener
        const fIn = document.getElementById('mediaIn');
        const qIn = document.getElementById('quoteIn');
        const btn = document.getElementById('pubBtn');
        const feed = document.getElementById('mainFeed');

        btn.addEventListener('click', function() {
            const file = fIn.files[0];
            if (!file) {
                alert("Select a file first.");
                return;
            }

            const reader = new FileReader();
            
            reader.onloadstart = function() {
                btn.innerText = "PROCESSING...";
                btn.disabled = true;
            };

            reader.onload = function(e) {
                const card = document.createElement('div');
                card.className = 'memory-card';
                
                const isVid = file.type.includes('video');
                const mediaTag = isVid 
                    ? '<video src="'+e.target.result+'" controls autoplay loop muted></video>' 
                    : '<img src="'+e.target.result+'">';

                card.innerHTML = mediaTag + '<div class="quote-display">"' + (qIn.value || 'Captured moment.') + '"</div>';
                
                feed.prepend(card);
                
                // Reset
                fIn.value = '';
                qIn.value = '';
                btn.innerText = "PUBLISH TO ARCHIVE";
                btn.disabled = false;
                
                document.getElementById('gallery-root').scrollIntoView();
            };

            reader.onerror = function() {
                alert("Browser security is blocking the file. Try a smaller photo or a different browser.");
                btn.innerText = "PUBLISH TO ARCHIVE";
                btn.disabled = false;
            };

            reader.readAsDataURL(file);
        });
    </script>
</body>
  </html>
