<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Earth Archive | Ayushi Srivastava</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@1,900&family=Times+New+Roman:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body, html { margin: 0; padding: 0; color: #fff; font-family: 'Times New Roman', serif; background-color: #0c0f0c; scroll-behavior: smooth; }
        
        nav { position: fixed; top: 0; width: 100%; background: rgba(0,0,0,0.95); z-index: 1000; padding: 15px 0; display: flex; justify-content: center; gap: 25px; border-bottom: 1px solid #333; }
        .nav-link { color: #fff; text-transform: uppercase; font-size: 0.7rem; letter-spacing: 2px; text-decoration: none; opacity: 0.7; }
        
        /* Updated wallpaper with your chosen URL */
        .hero {
            height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center;
            background: linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.3)), url('https://wallpapercave.com/wp/wp4287713.jpg');
            background-size: cover; background-position: center; background-repeat: no-repeat; 
            border-bottom: 2px solid rgba(255,255,255,0.2); /* The finishing line */
        }
        .main-title { font-family: 'Playfair Display', serif; font-size: clamp(2rem, 8vw, 5rem); font-style: italic; margin: 0; text-shadow: 2px 2px 10px rgba(0,0,0,0.5); }
        .signature { margin-top: 15px; font-size: 0.8rem; letter-spacing: 3px; text-transform: uppercase; border-top: 1px solid #fff; padding-top: 10px; }

        .container { padding: 80px 15px; max-width: 700px; margin: 0 auto; }
        .memory-card { background: #111; border: 1px solid #222; border-radius: 5px; overflow: hidden; margin-bottom: 50px; box-shadow: 0 15px 30px rgba(0,0,0,0.5); }
        .memory-card img { width: 100%; display: block; max-height: 80vh; object-fit: contain; background: #000; }
        .quote-display { padding: 25px; font-family: 'Playfair Display', serif; font-style: italic; font-size: 1.1rem; text-align: center; background: #161616; border-top: 1px solid #222; line-height: 1.6; color: #ddd; }
    </style>
</head>
<body>

    <nav>
        <a href="#cover" class="nav-link">Cover</a>
        <a href="#gallery" class="nav-link">Gallery</a>
    </nav>

    <div id="cover" class="hero">
        <h1 class="main-title">THE EARTH ARCHIVE</h1>
        <div class="signature">By Ayushi Srivastava</div>
    </div>

    <div id="gallery" class="container">
        
        <div class="memory-card">
            <img src="Screenshot_20260518_160936_Gallery.jpg" alt="Sunrise">
            <div class="quote-display">
                "The way the sun is peeking through the clouds gives off such a new beginnings vibe. It’s a quiet reminder that clarity always finds a way back to us, even on the grayest days."
            </div>
        </div>

        <div class="memory-card">
            <img src="Screenshot_20260519_141327_Gallery.jpg" alt="Green Leaves">
        </div>

    </div>

</body>
</html>
